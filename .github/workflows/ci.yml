name: ZigModu CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # ── Build & Test Matrix ────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            zig-bin: zig-linux-x86_64
          - os: macos-latest
            zig-bin: zig-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-${{ runner.os }}-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq mariadb-connector-c sqlite3 || true

      - name: Check formatting
        run: zig fmt --check src/

      - name: Build library
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: .zig-cache/

  # ── Lint & Audit ──────────────────────────────
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Zig fmt check
        run: zig fmt --check src/

      - name: Architecture validation
        run: zig build test -- --test-filter "architecture"

      - name: Security scan
        run: zig build test -- --test-filter "SecurityScanner"

  # ── Benchmark ──────────────────────────────────
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Run benchmarks
        run: zig build benchmark -Doptimize=ReleaseFast

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'

  # ── Docker Build ──────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, lint]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release ────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifacts
        run: |
          mkdir -p release
          cp -r zig-out/bin release/
          cp -r zig-out/lib release/
          cp README.md CHANGELOG.md LICENSE release/ 2>/dev/null || true
          tar -czf zigmodu-${{ github.ref_name }}-linux-x86_64.tar.gz -C release .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: zigmodu-${{ github.ref_name }}-linux-x86_64.tar.gz
