name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

  ZIG_VERSION: 0.16.0
  ZIG_VERSION: 0.15.2

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@d6a4f1d07765b7f2c5a025d23d1df66dd98f14  # v2
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Cache Zig dependencies
      uses: actions/cache@6849a6489940f00c726f9b9dbd0e66b3e8e3f7b2  # v4
      with:
        path: |
          ~/.cache/zig
          .zig-cache
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
        restore-keys: |
          ${{ runner.os }}-zig-

    - name: Build
      run: zig build

    - name: Run tests
      run: zig build test

    - name: Run example
      run: zig build run

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@d6a4f1d07765b7f2c5a025d23d1df66dd98f14  # v2
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Check formatting
      run: zig fmt --check .

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@d6a4f1d07765b7f2c5a025d23d1df66dd98f14  # v2
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Generate documentation
      run: zig build docs

    - name: Run benchmarks
      run: zig build benchmark

  examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - basic
          - bookstore-service
          - dependency-injection
          - distributed-events
          - event_bus
          - event-driven
          - metaverse-creative
          - testing
          - v2-showcase

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@d6a4f1d07765b7f2c5a025d23d1df66dd98f14  # v2
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Cache Zig dependencies
      uses: actions/cache@6849a6489940f00c726f9b9dbd0e66b3e8e3f7b2  # v4
      with:
        path: |
          ~/.cache/zig
          .zig-cache
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
        restore-keys: |
          ${{ runner.os }}-zig-

    - name: Build example
      working-directory: examples/${{ matrix.example }}
      run: zig build

    - name: Test example
      working-directory: examples/${{ matrix.example }}
      run: zig build test || echo "No tests in example"