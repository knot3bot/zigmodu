# ─────────────────────────────────────────────────
# ZigModu Development / Production Compose Stack
# ─────────────────────────────────────────────────

version: "3.9"

services:
  # ── Framework application ──────────────────────
  zigmodu:
    build:
      context: .
      dockerfile: Dockerfile
    image: zigmodu:latest
    container_name: zigmodu-app
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${CLUSTER_PORT:-9091}:9091"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-zigmodu}
      - DB_USER=${DB_USER:-zigmodu}
      - DB_PASS=${DB_PASS:-zigmodu}
      - HTTP_PORT=8080
    volumes:
      - ./config:/etc/zigmodu:ro
      - zigmodu_logs:/var/log/zigmodu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zigmodu-net

  # ── PostgreSQL (primary datastore) ─────────────
  postgres:
    image: postgres:17-alpine
    container_name: zigmodu-pg
    environment:
      POSTGRES_DB: ${DB_NAME:-zigmodu}
      POSTGRES_USER: ${DB_USER:-zigmodu}
      POSTGRES_PASSWORD: ${DB_PASS:-zigmodu}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zigmodu} -d ${DB_NAME:-zigmodu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zigmodu-net

  # ── Redis (cache / pub-sub) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: zigmodu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - zigmodu-net

  # ── Vault (secrets — dev only) ─────────────────
  vault:
    image: hashicorp/vault:1.18
    container_name: zigmodu-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    volumes:
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - zigmodu-net
    profiles:
      - secrets

  # ── Jaeger (tracing — dev only) ────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.65
    container_name: zigmodu-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"     # UI
      - "${JAEGER_COLLECTOR_PORT:-14268}:14268" # Collector
      - "${OTLP_GRPC_PORT:-4317}:4317"       # OTLP gRPC
      - "${OTLP_HTTP_PORT:-4318}:4318"       # OTLP HTTP
    restart: unless-stopped
    networks:
      - zigmodu-net
    profiles:
      - tracing

volumes:
  pg_data:
    name: zigmodu_pg_data
  redis_data:
    name: zigmodu_redis_data
  zigmodu_logs:
    name: zigmodu_logs
  vault_data:
    name: zigmodu_vault_data

networks:
  zigmodu-net:
    name: zigmodu-net
    driver: bridge
